# Use the PID using 8081
server.port=8081

# MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

# Hibernate DDL /JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO

#adding sending email's information
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

app.resetPasswordUrl=${FRONTEND_RESET_URL:http://localhost:5173/resetpassword}

# ---- Mail timeouts so it doesn't hang forever ----
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ---- Helpful while debugging ----
spring.mail.properties.mail.debug=true

#add this to stop hibernate from converting names to snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

#adding this because  of token for address
app.jwt.secret=${JWT_SECRET}
app.jwt.expirationMs=86400000

# to store sessions
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

##locally storing profile picture
app.upload-dir=${UPLOAD_DIR:backend/uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.allowed-file-extensions=.jpg,.jpeg,.png

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# OAuth2 - Facebook
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email

# Facebook provider overrides
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v22.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v22.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,first_name,last_name,email,picture
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

weather.openweather.apiKey=${OPENWEATHER_API_KEY}

#reading frontend
app.frontend.base-url=http://localhost:5173

#make session cooki die when browser closes
server.servlet.session.cookie.max-age=-1
server.servlet.session.timeout=30m